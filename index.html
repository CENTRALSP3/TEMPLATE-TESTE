<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiceNow - Preview Responsivo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html,
    body {
      width: 100%;
      min-height: 100%;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #app {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #stage {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background-color: #111;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
    }
    #bg-placeholder,
    #video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: rgba(0, 0, 0, 0.28);
      pointer-events: none;
    }
    #video-placeholder {
      background: rgba(0, 0, 0, 0.45);
    }
    #video-container {
      position: absolute;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    #video-frame {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 0;
      display: block;
    }

    /* ===== QR POPUP ===== */
    #qr-popup {
      position: fixed;
      z-index: 100;
      display: block;
      width: 210px;
      height: auto;
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      border-radius: 16px;
      overflow: hidden;
    }
    #qr-popup img {
      width: 100%;
      height: auto;
      display: block;
    }
    #qr-popup:hover {
      transform: translateY(-50%) scale(1.03);
    }

    /* Desktop - Canto esquerdo, alinhado ao meio vertical */
    #qr-popup {
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
    }

    #device-badge {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      background: rgba(17, 24, 39, 0.88);
      color: #fff;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      letter-spacing: 0.3px;
      user-select: none;
      backdrop-filter: blur(4px);
    }

    /* Mobile - Inferior centralizado */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      #qr-popup {
        left: 50%;
        top: auto;
        bottom: 24px;
        transform: translateX(-50%);
        width: 260px;
        max-width: 75vw;
      }
      #qr-popup:hover {
        transform: translateX(-50%) scale(1.03);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage">
      <div id="bg-placeholder">Carregando imagem de fundo…</div>
      <div id="video-container">
        <video
          id="video-frame"
          controls
          autoplay
          playsinline
          loop
        >
          <source src="service-now.mp4" type="video/mp4" />
          Seu navegador não suporta reprodução de vídeo.
        </video>
        <div id="video-placeholder">Carregando vídeo…</div>
      </div>
    </div>

    <!-- QR CODE POPUP -->
    <a

      href="https://academiadamodacea.com.br/app/cursopresencial/matricula/a8c85dda-fa08-40c8-a35c-e5f49c6f3195"
      target="_blank"
      rel="noopener noreferrer"
    >
